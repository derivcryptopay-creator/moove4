<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrêtRapide – Votre Solution de Crédit</title>

    <link rel="stylesheet" href="common.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #f47312;
            opacity: 1;
            transition: opacity 0.6s ease;
        }
        
        body.fade-out {
            opacity: 0;
        }
        
        .splash-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(160deg, #f47312 0%, #d45f00 100%);
            color: #fff;
        }
        
        .logo-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            margin-bottom: 50px;
        }
        
        .logo-circle {
            width: 90px;
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
            animation: pulse 2s infinite;
        }
        
        .logo-circle span {
            color: #f47312;
            font-size: 42px;
            font-weight: 800;
            letter-spacing: -1px;
        }
        
        .brand-name {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        .brand-tagline {
            font-size: 13px;
            font-weight: 400;
            opacity: 0.8;
            letter-spacing: 0.5px;
        }
        
        .loader-track {
            width: 180px;
            height: 3px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 999px;
            overflow: hidden;
        }
        
        .loader-fill {
            height: 100%;
            width: 0;
            background: #fff;
            border-radius: inherit;
            animation: fillBar 3s ease-in-out forwards;
        }
        
        @keyframes fillBar {
            from {
                width: 0%;
            }
            to {
                width: 100%;
            }
        }
        
        @keyframes pulse {
            0%,
            100% {
                transform: scale(0.97);
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
            }
            50% {
                transform: scale(1.03);
                box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
            }
        }
    </style>
</head>

<body>

    <div class="splash-container">

        <div class="logo-wrap">
            <div class="logo-circle">
                <span>B</span>
            </div>

            <div class="brand-name">
                PrêtRapide
            </div>

            <div class="brand-tagline">
                Votre crédit, rapide et sécurisé
            </div>
        </div>

        <div class="loader-track">
            <div class="loader-fill"></div>
        </div>

    </div>

    <script src="api.js"></script>

    <script>
        setTimeout(() => {

            // Use transitionTo() from api.js if available
            if (typeof transitionTo === "function") {
                transitionTo("calculator.html", "Chargement…", 600);
                return;
            }

            // Fallback transition
            document.body.classList.add("fade-out");

            setTimeout(() => {
                window.location.href = "calculator.html";
            }, 600);

        }, 3000);
    </script>

</body>

</html>
