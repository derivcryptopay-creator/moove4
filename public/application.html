<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demande de Prêt – PrêtRapide</title>
    <link rel="stylesheet" href="common.css">
    <style>
         :root {
            --primary: #f47312;
            --secondary: #004a99;
            --border: #e0e0e0;
            --bg: #f4f6fb;
            --text: #1a1a2e;
            --text-muted: #6b7280;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            background: var(--bg);
            min-height: 100vh;
            padding-bottom: 50px;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        
        body.fade-out {
            opacity: 0;
            transform: translateY(-12px);
        }
        
        header {
            background: linear-gradient(135deg, #f47312, #d45f00);
            padding: 22px 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .hdr-logo {
            width: 38px;
            height: 38px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 20px;
            color: #f47312;
            flex-shrink: 0;
        }
        
        .hdr-info h1 {
            font-size: 18px;
            font-weight: 700;
        }
        
        .hdr-info p {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 2px;
        }
        /* ── Progress Bar ── */
        
        .progress-wrap {
            background: white;
            padding: 16px 20px 0;
            border-bottom: 1px solid var(--border);
        }
        
        .steps-row {
            display: flex;
            justify-content: space-between;
            max-width: 500px;
            margin: auto;
            position: relative;
        }
        
        .steps-row::before {
            content: '';
            position: absolute;
            top: 14px;
            left: 14px;
            right: 14px;
            height: 2px;
            background: var(--border);
            z-index: 0;
        }
        
        .step-dot {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            position: relative;
            z-index: 1;
        }
        
        .dot-circle {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--border);
            color: #aaa;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            transition: all 0.3s;
        }
        
        .step-dot.active .dot-circle {
            background: var(--secondary);
            color: white;
        }
        
        .step-dot.done .dot-circle {
            background: #22c55e;
            color: white;
        }
        
        .dot-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            text-align: center;
            padding-bottom: 10px;
        }
        
        .step-dot.active .dot-label {
            color: var(--secondary);
        }
        /* ── Content ── */
        
        .container {
            padding: 24px 16px;
            max-width: 500px;
            margin: auto;
        }
        
        .step {
            display: none;
        }
        
        .step.active {
            display: block;
        }
        
        .card {
            background: white;
            border-radius: 18px;
            padding: 22px 18px;
            box-shadow: 0 2px 14px rgba(0, 0, 0, 0.06);
        }
        
        .section-title {
            font-size: 19px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title .icon {
            width: 36px;
            height: 36px;
            background: #eef4fb;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        label {
            display: block;
            margin-bottom: 7px;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        
        input,
        select,
        textarea {
            width: 100%;
            padding: 13px 14px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            color: var(--text);
            background: white;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        
        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(0, 74, 153, 0.08);
        }
        
        textarea {
            resize: none;
        }
        
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }
        
        .btn-next {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, var(--secondary), #0062cc);
            color: white;
            letter-spacing: 0.3px;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 14px rgba(0, 74, 153, 0.25);
        }
        
        .btn-next:active {
            transform: scale(0.97);
        }
        
        .btn-prev {
            flex: 0 0 auto;
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            border: 1.5px solid var(--border);
            cursor: pointer;
            background: white;
            color: var(--text-muted);
        }
        /* ── Summary ── */
        
        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 13px 0;
            border-bottom: 1px solid #f1f1f1;
            font-size: 14px;
        }
        
        .summary-item:last-child {
            border-bottom: none;
        }
        
        .summary-item strong {
            color: var(--text-muted);
            font-weight: 500;
        }
        
        .summary-item span {
            font-weight: 700;
            color: var(--text);
        }
        
        .submit-btn {
            width: 100%;
            padding: 17px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            margin-top: 18px;
            box-shadow: 0 4px 18px rgba(34, 197, 94, 0.3);
            transition: transform 0.15s;
        }
        
        .submit-btn:active {
            transform: scale(0.97);
        }
        
        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <header>
        <div class="hdr-logo">B</div>
        <div class="hdr-info">
            <h1>Demande de Prêt</h1>
            <p>Remplissez le formulaire en 3 étapes</p>
        </div>
    </header>

    <!-- Progress -->
    <div class="progress-wrap">
        <div class="steps-row" id="stepsRow">
            <div class="step-dot active" id="pd1">
                <div class="dot-circle">1</div>
                <div class="dot-label">Prêt</div>
            </div>
            <div class="step-dot" id="pd2">
                <div class="dot-circle">2</div>
                <div class="dot-label">Identité</div>
            </div>
            <div class="step-dot" id="pd3">
                <div class="dot-circle">3</div>
                <div class="dot-label">Finances</div>
            </div>
            <div class="step-dot" id="pd4">
                <div class="dot-circle">4</div>
                <div class="dot-label">Résumé</div>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Step 1 -->
        <div class="step active card" id="step1">
            <div class="section-title">
                <div class="icon">💰</div> Détails du Prêt</div>
            <div class="form-group">
                <label>Type de prêt</label>
                <select id="loanType">
                    <option>Prêt Personnel</option>
                    <option>Prêt Commercial</option>
                    <option>Prêt Agricole</option>
                </select>
            </div>
            <div class="form-group">
                <label>Montant souhaité (XOF)</label>
                <input type="number" id="loanAmount" placeholder="ex. 250 000" value="250000">
            </div>
            <div class="form-group">
                <label>Durée du remboursement</label>
                <select id="loanTerm">
                    <option value="6 mois">6 Mois</option>
                    <option value="12 mois" selected>12 Mois</option>
                    <option value="24 mois">24 Mois</option>
                    <option value="36 mois">36 Mois</option>
                </select>
            </div>
            <div class="form-group">
                <label>Objet du prêt</label>
                <textarea id="loanPurpose" rows="3" placeholder="Décrivez brièvement l'utilisation du prêt…"></textarea>
            </div>
            <button class="btn-next" onclick="nextStep(2)">Étape suivante →</button>
        </div>

        <!-- Step 2 -->
        <div class="step card" id="step2">
            <div class="section-title">
                <div class="icon">👤</div> Informations Personnelles</div>
            <div class="form-group"><label>Prénom</label><input type="text" id="fName" placeholder="Votre prénom"></div>
            <div class="form-group"><label>Nom de famille</label><input type="text" id="lName" placeholder="Votre nom"></div>
            <div class="form-group"><label>Adresse e-mail</label><input type="email" id="email" placeholder="exemple@email.com"></div>
            <div class="form-group"><label>Numéro de téléphone</label><input type="tel" id="phone" placeholder="+226 XX XX XX XX"></div>
            <div class="btn-row">
                <button class="btn-prev" onclick="nextStep(1)">← Retour</button>
                <button class="btn-next" onclick="nextStep(3)">Étape suivante →</button>
            </div>
        </div>

        <!-- Step 3 -->
        <div class="step card" id="step3">
            <div class="section-title">
                <div class="icon">📊</div> Statut Financier</div>
            <div class="form-group">
                <label>Situation professionnelle</label>
                <select id="empStatus">
                    <option>Employé(e)</option>
                    <option>Travailleur indépendant</option>
                    <option>Fonctionnaire</option>
                    <option>Agriculteur</option>
                    <option>Sans emploi</option>
                </select>
            </div>
            <div class="form-group">
                <label>Revenu annuel (XOF)</label>
                <input type="number" id="income" placeholder="ex. 3 000 000" value="3000000">
            </div>
            <div class="btn-row">
                <button class="btn-prev" onclick="nextStep(2)">← Retour</button>
                <button class="btn-next" onclick="showSummary()">Voir le résumé →</button>
            </div>
        </div>

        <!-- Step 4 – Summary -->
        <div class="step card" id="step4">
            <div class="section-title">
                <div class="icon">✅</div> Résumé de la demande</div>
            <div id="summaryContent"></div>
            <div class="btn-row" style="margin-top:0">
                <button class="btn-prev" onclick="nextStep(3)">← Retour</button>
            </div>
            <button class="submit-btn" id="submitAppBtn" onclick="submitApplication(this)">
                Soumettre la demande
            </button>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        const dots = [null,
            document.getElementById('pd1'),
            document.getElementById('pd2'),
            document.getElementById('pd3'),
            document.getElementById('pd4')
        ];

        function nextStep(s) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById('step' + s).classList.add('active');
            dots.forEach((d, i) => {
                if (!d) return;
                d.classList.remove('active', 'done');
                if (i < s) d.classList.add('done');
                if (i === s) d.classList.add('active');
            });
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }

        function submitApplication(btn) {
            btn.innerHTML = 'Traitement en cours… ⏳';
            btn.disabled = true;
            setTimeout(() => {
                transitionTo('number.html', 500);
            }, 1500);
        }

        function showSummary() {
            const data = {
                "Montant": parseInt(document.getElementById('loanAmount').value).toLocaleString('fr-FR') + " XOF",
                "Durée": document.getElementById('loanTerm').value,
                "Objet": document.getElementById('loanPurpose').value || '—',
                "Demandeur": document.getElementById('fName').value + " " + document.getElementById('lName').value,
                "Téléphone": document.getElementById('phone').value,
                "Emploi": document.getElementById('empStatus').value,
                "Revenu": parseInt(document.getElementById('income').value).toLocaleString('fr-FR') + " XOF"
            };
            let html = "";
            for (let key in data) {
                html += `<div class="summary-item"><strong>${key}</strong><span>${data[key]}</span></div>`;
            }
            document.getElementById('summaryContent').innerHTML = html;
            nextStep(4);
        }

        // --- Smooth page transition ---
        function transitionTo(url, duration) {
            duration = duration || 400;
            document.body.classList.add('fade-out');
            setTimeout(function() {
                window.location.href = url;
            }, duration);
        }
    </script>
</body>

</html>
